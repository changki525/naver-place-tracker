<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>네이버 플레이스 순위 추적기</title>
  <style>
    :root {
      --bg: #f5f6fa;
      --white: #ffffff;
      --sidebar-bg: #1e2a3a;
      --sidebar-hover: #2a3a4e;
      --sidebar-active: #03C75A;
      --border: #e2e5ee;
      --border-light: #f0f1f5;
      --text: #1a1e2e;
      --text-sub: #6b7280;
      --text-light: #9ca3af;
      --green: #03C75A;
      --green-light: #e8faf0;
      --green-dim: rgba(3,199,90,0.1);
      --red: #ef4444;
      --red-light: #fef2f2;
      --yellow: #f59e0b;
      --yellow-light: #fffbeb;
      --blue: #3b82f6;
      --blue-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      color: #fff;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s;
    }
    .sidebar-logo {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
    }
    .sidebar-logo .logo-text {
      font-size: 15px; font-weight: 700; line-height: 1.3;
    }
    .sidebar-logo .logo-sub {
      font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 400;
    }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-section {
      padding: 8px 20px 6px;
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; margin: 2px 8px;
      border-radius: 8px; cursor: pointer;
      font-size: 14px; color: rgba(255,255,255,0.7);
      transition: all 0.15s;
    }
    .nav-item:hover { background: var(--sidebar-hover); color: #fff; }
    .nav-item.active {
      background: rgba(3,199,90,0.15); color: var(--green);
    }
    .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-item .nav-badge {
      margin-left: auto; font-size: 11px; font-weight: 600;
      background: rgba(255,255,255,0.12); padding: 2px 8px;
      border-radius: 10px;
    }
    .nav-item.active .nav-badge {
      background: rgba(3,199,90,0.25); color: var(--green);
    }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 12px; color: rgba(255,255,255,0.35);
    }

    /* ─── Main Content ─── */
    .main {
      flex: 1; margin-left: 240px; min-height: 100vh;
    }
    .top-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .top-bar h2 { font-size: 18px; font-weight: 700; }
    .top-bar-right { display: flex; align-items: center; gap: 12px; }
    .mobile-menu-btn {
      display: none; background: none; border: none;
      font-size: 22px; cursor: pointer; padding: 4px;
    }

    .content { padding: 24px 32px; max-width: 1200px; }

    /* ─── Cards ─── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .card-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h3 {
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 20px 24px; }

    /* ─── 즐겨찾기 빠른 선택 ─── */
    .fav-quick {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
    }
    .fav-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px 6px 10px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; position: relative;
    }
    .fav-chip:hover { border-color: var(--green); background: var(--green-light); }
    .fav-chip.active { border-color: var(--green); background: var(--green-light); color: var(--green); }
    .fav-chip .fav-star { color: var(--yellow); font-size: 14px; }
    .fav-chip .fav-x {
      display: none; font-size: 14px; color: var(--text-light);
      cursor: pointer; margin-left: 2px;
    }
    .fav-chip:hover .fav-x { display: inline; }
    .fav-chip .fav-x:hover { color: var(--red); }
    .fav-empty-msg {
      color: var(--text-light); font-size: 13px; padding: 4px 0;
    }

    /* ─── Search Form ─── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-sub); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.2s;
      background: var(--bg);
    }
    .form-input:focus { border-color: var(--green); background: var(--white); }
    .form-input::placeholder { color: var(--text-light); }
    .form-hint {
      font-size: 12px; color: var(--text-light); margin-top: 4px;
    }
    .form-hint b { color: var(--green); }

    /* ─── Keyword Tags ─── */
    .kw-row {
      display: flex; gap: 8px; align-items: center;
    }
    .kw-row .form-input { flex: 1; }
    .tag-list {
      display: flex; flex-wrap: wrap; gap: 6px;
      min-height: 24px; margin-bottom: 14px;
    }
    .tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--green-light); color: #059669;
      padding: 5px 10px; border-radius: 16px;
      font-size: 12px; font-weight: 600;
      animation: tagIn 0.2s ease;
    }
    @keyframes tagIn { from { transform: scale(0.8); opacity: 0; } }
    .tag .tag-remove {
      cursor: pointer; font-size: 14px; line-height: 1;
      opacity: 0.5; transition: opacity 0.2s;
    }
    .tag .tag-remove:hover { opacity: 1; }
    .tag-hint { font-size: 12px; color: var(--text-light); }

    /* ─── Buttons ─── */
    .btn-primary {
      background: var(--green); color: #fff; border: none;
      border-radius: 8px; padding: 10px 24px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { background: #02b050; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      background: var(--white); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-outline:hover { border-color: var(--green); color: var(--green); }
    .btn-sm-add {
      background: var(--green); color: #fff; border: none;
      border-radius: 8px; padding: 10px 16px; font-size: 13px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-sm-add:hover { background: #02b050; }
    .btn-fav-toggle {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-fav-toggle:hover { border-color: var(--yellow); color: var(--yellow); }
    .btn-fav-toggle.saved { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-light); }
    .form-actions {
      display: flex; gap: 10px; align-items: center;
    }

    /* ─── Progress ─── */
    .progress-bar {
      background: var(--border-light); border-radius: 4px;
      height: 4px; overflow: hidden; margin-bottom: 16px;
    }
    .progress-fill {
      background: var(--green); height: 100%;
      border-radius: 4px; transition: width 0.5s ease; width: 0%;
    }

    /* ─── 실시간 결과 ─── */
    .live-section { display: none; }
    .live-section.show { display: block; }
    .live-title {
      font-size: 14px; font-weight: 600; margin-bottom: 12px;
      color: var(--text-sub);
    }
    .result-row {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.15s;
    }
    .result-row:last-child { border-bottom: none; }
    .result-rank {
      min-width: 64px; text-align: center;
      font-size: 22px; font-weight: 800;
    }
    .result-rank.top3 { color: var(--green); }
    .result-rank.top10 { color: var(--yellow); }
    .result-rank.other { color: var(--text); }
    .result-rank.notfound { color: var(--red); font-size: 13px; font-weight: 600; }
    .result-rank.pending { color: var(--text-light); }
    .result-info { flex: 1; }
    .result-keyword { font-size: 14px; font-weight: 600; }
    .result-meta { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .result-change {
      font-size: 13px; font-weight: 700;
      padding: 3px 10px; border-radius: 6px; white-space: nowrap;
    }
    .change-up { color: var(--green); background: var(--green-light); }
    .change-down { color: var(--red); background: var(--red-light); }
    .change-same { color: var(--text-light); }
    .mini-spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--green);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── 순위 테이블 ─── */
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table thead th {
      text-align: left; padding: 10px 14px;
      font-size: 12px; font-weight: 600;
      color: var(--text-light); text-transform: uppercase;
      letter-spacing: 0.3px;
      border-bottom: 2px solid var(--border);
      background: var(--bg);
    }
    .rank-table tbody tr {
      cursor: pointer; transition: background 0.1s;
    }
    .rank-table tbody tr:hover { background: var(--bg); }
    .rank-table tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-light);
      font-size: 14px;
    }
    .rank-cell {
      font-weight: 800; font-size: 16px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .rank-cell.top3 { color: var(--green); }
    .rank-cell.top10 { color: var(--yellow); }
    .rank-cell.other { color: var(--text); }
    .rank-cell.notfound { color: var(--text-light); font-size: 12px; font-weight: 600; }
    .rank-change { font-size: 11px; font-weight: 700; }
    .rank-change.up { color: var(--green); }
    .rank-change.down { color: var(--red); }
    .rank-change.same { color: var(--text-light); }

    .place-name-cell {
      display: flex; align-items: center; gap: 8px;
    }
    .place-name-cell .star-btn {
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--text-light);
      transition: color 0.15s; padding: 0;
    }
    .place-name-cell .star-btn:hover { color: var(--yellow); }
    .place-name-cell .star-btn.saved { color: var(--yellow); }
    .place-name-text { font-weight: 600; }
    .place-id-small { font-size: 11px; color: var(--text-light); font-family: 'SF Mono', monospace; }

    .empty-state {
      text-align: center; padding: 48px 20px; color: var(--text-light);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }

    /* ─── 이력 상세 ─── */
    .history-panel { display: none; }
    .history-panel.show { display: block; }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
    }
    .history-tabs {
      display: flex; gap: 6px; margin: 14px 0; flex-wrap: wrap;
    }
    .history-tab {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--white);
      color: var(--text-sub); transition: all 0.15s;
    }
    .history-tab:hover { border-color: var(--green); }
    .history-tab.active {
      background: var(--green); color: #fff; border-color: var(--green);
    }

    /* ─── Chart ─── */
    .chart-wrap {
      background: var(--white); border: 1px solid var(--border-light);
      border-radius: 10px; padding: 16px; margin-bottom: 16px;
      position: relative;
    }
    .chart-wrap canvas { width: 100%; height: 220px; display: block; }
    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 12px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border-light);
    }
    .chart-legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-sub);
    }
    .chart-legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .chart-tooltip {
      position: absolute; background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; font-size: 12px;
      pointer-events: none; opacity: 0; transition: opacity 0.15s;
      z-index: 10; box-shadow: var(--shadow-md);
    }
    .chart-tooltip.show { opacity: 1; }

    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .history-table th {
      text-align: left; padding: 8px 12px;
      border-bottom: 2px solid var(--border);
      color: var(--text-light); font-weight: 600; font-size: 12px;
    }
    .history-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-light);
    }
    .history-table tr:hover td { background: var(--bg); }

    /* ─── 일자별 순위 박스 ─── */
    .daily-kw-section {
      margin-bottom: 16px;
    }
    .daily-kw-label {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .daily-kw-label .kw-badge {
      background: var(--green-light); color: #059669;
      padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;
    }
    .daily-boxes {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .daily-box {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; min-width: 90px;
      text-align: center; transition: all 0.15s;
      position: relative;
    }
    .daily-box:hover { border-color: var(--green); box-shadow: var(--shadow-md); }
    .daily-box .db-date {
      font-size: 11px; color: var(--text-light); font-weight: 500;
      margin-bottom: 4px; white-space: nowrap;
    }
    .daily-box .db-rank {
      font-size: 22px; font-weight: 800; line-height: 1.2;
    }
    .daily-box .db-rank.top3 { color: var(--green); }
    .daily-box .db-rank.top10 { color: var(--yellow); }
    .daily-box .db-rank.other { color: var(--text); }
    .daily-box .db-rank.notfound { color: var(--text-light); font-size: 11px; font-weight: 600; }
    .daily-box .db-change {
      font-size: 11px; font-weight: 700; margin-top: 3px;
      display: flex; align-items: center; justify-content: center; gap: 2px;
    }
    .daily-box .db-change.up { color: var(--green); }
    .daily-box .db-change.down { color: var(--red); }
    .daily-box .db-change.same { color: var(--text-light); }
    .daily-box .db-change.new-entry { color: var(--blue); font-weight: 500; }

    /* ─── Stats row ─── */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 20px;
    }
    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      box-shadow: var(--shadow);
    }
    .stat-label { font-size: 12px; color: var(--text-light); font-weight: 500; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; }
    .stat-value.green { color: var(--green); }

    /* ─── Badge ─── */
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
    }
    .badge-green { background: var(--green-light); color: #059669; }
    .badge-gray { background: var(--bg); color: var(--text-light); }

    /* ─── 전체 순위 리스트 ─── */
    .ranked-list-wrap {
      overflow: hidden; max-height: 0;
      transition: max-height 0.3s ease;
    }
    .ranked-list-wrap.open { max-height: 5000px; }
    .ranked-list-toggle {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px;
      font-size: 12px; font-weight: 600; color: var(--text-sub);
      cursor: pointer; transition: all 0.15s;
      margin-top: 10px; width: 100%;
    }
    .ranked-list-toggle:hover { border-color: var(--green); color: var(--green); }
    .ranked-list-toggle .toggle-arrow {
      transition: transform 0.2s; display: inline-block;
    }
    .ranked-list-toggle.open .toggle-arrow { transform: rotate(180deg); }
    .ranked-list-table {
      width: 100%; border-collapse: collapse; margin-top: 8px;
      font-size: 13px;
    }
    .ranked-list-table thead th {
      text-align: left; padding: 8px 10px;
      font-size: 11px; font-weight: 600; color: var(--text-light);
      border-bottom: 2px solid var(--border); background: var(--bg);
      position: sticky; top: 0; z-index: 1;
    }
    .ranked-list-table tbody td {
      padding: 7px 10px; border-bottom: 1px solid var(--border-light);
    }
    .ranked-list-table tbody tr:hover { background: var(--bg); }
    .ranked-list-table tbody tr.rl-highlight {
      background: var(--green-light) !important;
    }
    .ranked-list-table tbody tr.rl-highlight td {
      font-weight: 700; color: #059669;
    }
    .rl-rank-num {
      font-weight: 800; min-width: 32px; display: inline-block; text-align: center;
    }
    .rl-rank-num.top1 { color: #d4a017; }
    .rl-rank-num.top2 { color: #8a8a8a; }
    .rl-rank-num.top3 { color: #cd7f32; }
    .rl-my-badge {
      background: var(--green); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px; margin-left: 6px;
      white-space: nowrap;
    }
    .rl-scroll-box {
      max-height: 400px; overflow-y: auto;
      border: 1px solid var(--border); border-radius: 8px;
      margin-top: 8px;
    }
    .rl-scroll-box::-webkit-scrollbar { width: 6px; }
    .rl-scroll-box::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 3px;
    }

    /* ─── Responsive ─── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 99;
    }
    .sidebar-overlay.show { display: block; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .mobile-menu-btn { display: block; }
      .content { padding: 16px; }
      .top-bar { padding: 12px 16px; }
      .card-body { padding: 16px; }
      .card-header { padding: 14px 16px; }
      .form-actions { flex-direction: column; }
      .form-actions .btn-primary { width: 100%; justify-content: center; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .rank-table { font-size: 13px; }
      .rank-table thead th, .rank-table tbody td { padding: 8px 10px; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">N</div>
    <div>
      <div class="logo-text">플레이스 순위추적</div>
      <div class="logo-sub">Naver Place Tracker</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">메뉴</div>
    <div class="nav-item active" onclick="switchView('dashboard')" data-view="dashboard">
      <span class="nav-icon">📊</span> 대시보드
    </div>
    <div class="nav-item" onclick="switchView('check')" data-view="check">
      <span class="nav-icon">🔍</span> 순위 조회
    </div>
    <div class="nav-item" onclick="switchView('favorites')" data-view="favorites">
      <span class="nav-icon">⭐</span> 즐겨찾기
      <span class="nav-badge" id="navFavCount">0</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    v1.0 &middot; Playwright 기반
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
      <h2 id="pageTitle">대시보드</h2>
    </div>
    <div class="top-bar-right">
      <span style="font-size:13px;color:var(--text-light)" id="lastUpdate"></span>
    </div>
  </div>

  <div class="content">

    <!-- ==================== 대시보드 뷰 ==================== -->
    <div id="viewDashboard">

      <!-- 통계 -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-label">추적 중인 업체</div>
          <div class="stat-value green" id="statPlaces">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">등록 키워드</div>
          <div class="stat-value" id="statKeywords">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">TOP 3 키워드</div>
          <div class="stat-value green" id="statTop3">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">즐겨찾기</div>
          <div class="stat-value" id="statFav">0</div>
        </div>
      </div>

      <!-- 즐겨찾기 빠른접근 -->
      <div class="card" id="favQuickCard" style="display:none">
        <div class="card-header">
          <h3>⭐ 빠른 접근</h3>
        </div>
        <div class="card-body">
          <div class="fav-quick" id="favQuick"></div>
        </div>
      </div>

      <!-- 업체별 순위 카드 -->
      <div id="placeCardsWrap">
        <div class="empty-state" id="emptyDashboard">
          <div class="empty-icon">📍</div>
          <p>아직 추적 중인 업체가 없습니다.<br>순위 조회에서 키워드를 검색해보세요!</p>
        </div>
      </div>

      <!-- 이력 상세 (대시보드 내 인라인) -->
      <div class="card history-panel" id="historyPanel">
        <div class="card-header">
          <div class="history-header" style="width:100%">
            <h3 id="historyTitle">순위 이력</h3>
            <button class="btn-primary" id="recheckBtn" onclick="recheckCurrentPlace()" style="font-size:13px;padding:8px 16px">
              🔄 순위 재측정
            </button>
          </div>
        </div>
        <div class="card-body">
          <div class="history-tabs" id="historyTabs"></div>
          <div class="chart-wrap" id="chartWrap">
            <canvas id="rankChart"></canvas>
            <div class="chart-tooltip" id="chartTooltip"></div>
            <div class="chart-legend" id="chartLegend"></div>
          </div>
          <div id="dailyBoxesWrap"></div>
        </div>
      </div>
    </div>

    <!-- ==================== 순위 조회 뷰 ==================== -->
    <div id="viewCheck" style="display:none">
      <div class="card">
        <div class="card-header">
          <h3>🔍 순위 조회</h3>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label>네이버 플레이스 URL</label>
            <input type="text" class="form-input" id="placeUrl" placeholder="https://map.naver.com/... 또는 Place ID 입력">
            <div class="form-hint">* 네이버 플레이스 앱이 아닌 <b>크롬 브라우저</b>에서 업체 페이지 URL을 복사해주세요</div>
          </div>

          <div class="form-group">
            <label>검색 키워드</label>
            <div class="kw-row">
              <input type="text" class="form-input" id="kwInput" placeholder="키워드 입력 후 Enter">
              <button class="btn-sm-add" onclick="addKeyword()">추가</button>
            </div>
          </div>

          <div class="tag-list" id="tagList">
            <span class="tag-hint" id="tagHint">키워드를 추가해주세요 (여러 개 가능, 쉼표 구분)</span>
          </div>

          <div class="form-actions">
            <button class="btn-primary" id="checkBtn" onclick="runCheck()" style="flex:1;justify-content:center">
              🔍 전체 키워드 순위 조회
            </button>
            <button class="btn-fav-toggle" id="favBtn" onclick="toggleFavorite()">☆ 즐겨찾기</button>
          </div>
        </div>
      </div>

      <!-- 실시간 결과 -->
      <div class="card live-section" id="liveResults">
        <div class="card-header">
          <h3 id="liveTitle">조회 결과</h3>
        </div>
        <div class="card-body">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div id="liveCards"></div>
        </div>
      </div>
    </div>

    <!-- ==================== 즐겨찾기 뷰 ==================== -->
    <div id="viewFavorites" style="display:none">
      <div class="card">
        <div class="card-header">
          <h3>⭐ 즐겨찾기 관리 <span class="badge badge-green" id="favViewCount">0</span></h3>
        </div>
        <div class="card-body">
          <div id="favListView"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  let historyData = null;
  const keywordList = [];
  const FAV_KEY = 'npt_favorites';
  let currentPlaceIdForHistory = null;

  // ─── View Switching ───
  function switchView(view) {
    document.getElementById('viewDashboard').style.display = view === 'dashboard' ? '' : 'none';
    document.getElementById('viewCheck').style.display = view === 'check' ? '' : 'none';
    document.getElementById('viewFavorites').style.display = view === 'favorites' ? '' : 'none';

    const titles = { dashboard: '대시보드', check: '순위 조회', favorites: '즐겨찾기' };
    document.getElementById('pageTitle').textContent = titles[view] || '';

    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.view === view);
    });

    closeSidebar();

    if (view === 'favorites') renderFavListView();
  }

  // ─── Mobile Sidebar ───
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }

  // ─── 즐겨찾기 ───
  function loadFavorites() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; }
    catch { return []; }
  }
  function saveFavorites(favs) { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }

  function renderFavQuick() {
    const favs = loadFavorites();
    const wrap = document.getElementById('favQuickCard');
    const grid = document.getElementById('favQuick');
    document.getElementById('navFavCount').textContent = favs.length;
    document.getElementById('statFav').textContent = favs.length;

    if (favs.length === 0) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';

    grid.innerHTML = favs.map((fav, i) => `
      <span class="fav-chip" onclick="loadFavorite(${i})" title="${esc(fav.url)}">
        <span class="fav-star">★</span>
        ${esc(fav.name || fav.url)}
        <span class="fav-x" onclick="event.stopPropagation();removeFavorite(${i})">&times;</span>
      </span>
    `).join('');
  }

  function renderFavListView() {
    const favs = loadFavorites();
    const el = document.getElementById('favListView');
    document.getElementById('favViewCount').textContent = favs.length;

    if (favs.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">⭐</div><p>즐겨찾기가 없습니다.<br>순위 조회에서 업체를 즐겨찾기에 추가해보세요.</p></div>';
      return;
    }

    el.innerHTML = '<table class="rank-table"><thead><tr><th>업체명</th><th>키워드</th><th>등록일</th><th></th></tr></thead><tbody>' +
      favs.map((fav, i) => `
        <tr>
          <td><span style="font-weight:600;cursor:pointer" onclick="loadFavorite(${i})">${esc(fav.name || fav.url)}</span></td>
          <td>${fav.keywords.map(k => `<span class="badge badge-green" style="margin-right:4px">${esc(k)}</span>`).join('')}</td>
          <td style="font-size:12px;color:var(--text-light)">${fav.createdAt ? new Date(fav.createdAt).toLocaleDateString('ko-KR') : '-'}</td>
          <td><button class="btn-outline" style="padding:4px 10px;font-size:12px;color:var(--red);border-color:var(--red)" onclick="removeFavorite(${i})">삭제</button></td>
        </tr>
      `).join('') +
      '</tbody></table>';
  }

  function loadFavorite(idx) {
    const favs = loadFavorites();
    const fav = favs[idx];
    if (!fav) return;

    switchView('check');
    document.getElementById('placeUrl').value = fav.url;
    lastPlaceUrl = fav.url;
    keywordList.length = 0;
    keywordList.push(...fav.keywords);
    renderTags();
    updateFavBtn();
  }

  function toggleFavorite() {
    const url = document.getElementById('placeUrl').value.trim();
    if (!url) { alert('Place URL 또는 ID를 먼저 입력해주세요.'); return; }
    if (keywordList.length === 0) { alert('키워드를 1개 이상 추가해주세요.'); return; }

    const favs = loadFavorites();
    const existIdx = favs.findIndex(f => f.url === url);
    if (existIdx >= 0) {
      favs.splice(existIdx, 1);
    } else {
      if (favs.length >= 10) { alert('즐겨찾기는 최대 10개까지 저장할 수 있습니다.'); return; }
      const placeName = findPlaceName(url);
      favs.push({ url, name: placeName || url, keywords: [...keywordList], createdAt: new Date().toISOString() });
    }
    saveFavorites(favs);
    renderFavQuick();
    updateFavBtn();
  }

  function removeFavorite(idx) {
    const favs = loadFavorites();
    favs.splice(idx, 1);
    saveFavorites(favs);
    renderFavQuick();
    renderFavListView();
    updateFavBtn();
    renderPlaceTable();
  }

  function findPlaceName(url) {
    if (!historyData?.places) return null;
    for (const p of Object.values(historyData.places)) {
      if (p.url === url || p.placeId === url) return p.placeName !== p.placeId ? p.placeName : null;
    }
    return null;
  }

  function togglePlaceFav(placeId) {
    const place = historyData?.places?.[placeId];
    if (!place) return;
    const favs = loadFavorites();
    const url = place.url || place.placeId;
    const existIdx = favs.findIndex(f => f.url === url || f.url === placeId);
    if (existIdx >= 0) {
      favs.splice(existIdx, 1);
    } else {
      if (favs.length >= 10) { alert('즐겨찾기는 최대 10개까지 저장할 수 있습니다.'); return; }
      const keywords = Object.keys(place.keywords || {});
      favs.push({ url, name: place.placeName || placeId, keywords, createdAt: new Date().toISOString() });
    }
    saveFavorites(favs);
    renderFavQuick();
    renderPlaceTable();
  }

  function updateFavBtn() {
    const btn = document.getElementById('favBtn');
    const url = document.getElementById('placeUrl').value.trim();
    const favs = loadFavorites();
    const isSaved = favs.some(f => f.url === url);
    btn.textContent = isSaved ? '★ 저장됨' : '☆ 즐겨찾기';
    btn.classList.toggle('saved', isSaved);
  }

  // ─── 초기화 ───
  async function init() {
    await loadHistoryData();
    renderPlaceTable();
    renderFavQuick();
    updateFavBtn();
  }

  async function loadHistoryData() {
    try {
      const resp = await fetch('/api/history');
      historyData = await resp.json();
    } catch { historyData = { places: {} }; }
  }

  // ─── 키워드 태그 ───
  function addKeyword(value) {
    const input = document.getElementById('kwInput');
    const raw = value || input.value.trim();
    if (!raw) return;
    const newKws = raw.split(',').map(k => k.trim()).filter(k => k && !keywordList.includes(k));
    keywordList.push(...newKws);
    input.value = '';
    renderTags();
    input.focus();
  }

  function removeKeyword(idx) { keywordList.splice(idx, 1); renderTags(); }

  function renderTags() {
    const list = document.getElementById('tagList');
    if (keywordList.length === 0) {
      list.innerHTML = '<span class="tag-hint">키워드를 추가해주세요 (여러 개 가능, 쉼표 구분)</span>';
      return;
    }
    list.innerHTML = keywordList.map((kw, i) => `
      <span class="tag">${esc(kw)}<span class="tag-remove" onclick="removeKeyword(${i})">&times;</span></span>
    `).join('');
  }

  document.getElementById('kwInput').addEventListener('keydown', e => {
    if (e.isComposing || e.keyCode === 229) return;
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addKeyword(); }
  });

  let lastPlaceUrl = '';
  document.getElementById('placeUrl').addEventListener('input', e => {
    const val = e.target.value.trim();
    if (lastPlaceUrl && val !== lastPlaceUrl && keywordList.length > 0) {
      keywordList.length = 0;
      renderTags();
    }
    lastPlaceUrl = val;
    updateFavBtn();
  });

  document.getElementById('placeUrl').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('kwInput').focus();
  });

  // ─── 순위 조회 ───
  let lastCheckedPlaceId = null;

  async function runCheck() {
    const urlInput = document.getElementById('placeUrl').value.trim();
    if (!urlInput) { alert('Place URL 또는 ID를 입력해주세요.'); return; }
    if (keywordList.length === 0) { alert('키워드를 1개 이상 추가해주세요.'); return; }

    lastCheckedPlaceId = null;
    const btn = document.getElementById('checkBtn');
    const liveSection = document.getElementById('liveResults');
    const liveCards = document.getElementById('liveCards');
    const liveTitle = document.getElementById('liveTitle');
    const progressFill = document.getElementById('progressFill');

    btn.disabled = true;
    liveSection.classList.add('show');
    progressFill.style.width = '0%';

    liveCards.innerHTML = keywordList.map((kw, i) => `
      <div id="kwWrap${i}">
        <div class="result-row" id="kwCard${i}">
          <div class="result-rank pending" id="kwRank${i}"><div class="mini-spinner"></div></div>
          <div class="result-info">
            <div class="result-keyword">${esc(kw)}</div>
            <div class="result-meta" id="kwMeta${i}">대기 중...</div>
          </div>
          <div id="kwChange${i}"></div>
        </div>
        <div id="kwRankedList${i}"></div>
      </div>
    `).join('');

    liveTitle.innerHTML = `조회 중... <span style="font-weight:400;color:var(--text-light)">(0 / ${keywordList.length})</span>`;
    let completed = 0;

    for (let i = 0; i < keywordList.length; i++) {
      const kw = keywordList[i];
      const rankEl = document.getElementById(`kwRank${i}`);
      const metaEl = document.getElementById(`kwMeta${i}`);
      const changeEl = document.getElementById(`kwChange${i}`);
      const card = document.getElementById(`kwCard${i}`);

      metaEl.textContent = '크롤링 중...';

      try {
        const resp = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: urlInput, keywords: [kw] }),
        });
        const data = await resp.json();

        if (data.error) {
          rankEl.className = 'result-rank notfound';
          rankEl.textContent = '오류';
          metaEl.textContent = data.error;
        } else {
          const r = data.results[0];
          const rank = r.rank;

          if (!r.found) {
            rankEl.className = 'result-rank notfound';
            rankEl.textContent = '순위권 밖';
          } else {
            const cls = rank <= 3 ? 'top3' : rank <= 10 ? 'top10' : 'other';
            rankEl.className = `result-rank ${cls}`;
            rankEl.textContent = `${rank}위`;
          }

          metaEl.textContent = `탐색 ${r.totalResults || 0}개 · ${r.matchedBy || '-'} · ${r.placeName || ''}`;

          if (r.found && r.previousRank !== null) {
            const diff = r.previousRank - rank;
            if (diff > 0) changeEl.innerHTML = `<span class="result-change change-up">▲ ${diff}</span>`;
            else if (diff < 0) changeEl.innerHTML = `<span class="result-change change-down">▼ ${Math.abs(diff)}</span>`;
            else changeEl.innerHTML = `<span class="result-change change-same">—</span>`;
          } else if (r.found) {
            changeEl.innerHTML = `<span class="result-change change-same">첫 조회</span>`;
          }

          if (data.placeId) lastCheckedPlaceId = data.placeId;
          if (data.placeName && completed === 0) {
            liveTitle.innerHTML = `${esc(data.placeName)} <span style="font-weight:400;color:var(--text-light)">순위 조회</span>`;
          }

          // 전체 순위 리스트 렌더링
          const rlWrap = document.getElementById(`kwRankedList${i}`);
          if (r.rankedList && r.rankedList.length > 0) {
            rlWrap.innerHTML = renderRankedList(r.rankedList, data.placeId, i);
          }
        }
      } catch (err) {
        rankEl.className = 'result-rank notfound';
        rankEl.textContent = '오류';
        metaEl.textContent = err.message;
      }

      completed++;
      progressFill.style.width = `${(completed / keywordList.length) * 100}%`;
      liveTitle.innerHTML = liveTitle.innerHTML.replace(/\(\d+ \/ \d+\)/, `(${completed} / ${keywordList.length})`);
    }

    liveTitle.innerHTML = liveTitle.innerHTML.replace(/조회 중\.\.\.|순위 조회/, '조회 완료 ✓');
    btn.disabled = false;
    await loadHistoryData();
    renderPlaceTable();
    updateFavName(urlInput);
    renderFavQuick();

    if (lastCheckedPlaceId) {
      switchView('dashboard');
      showHistory(lastCheckedPlaceId);
    }
  }

  function updateFavName(url) {
    const favs = loadFavorites();
    const fav = favs.find(f => f.url === url);
    if (!fav) return;
    const name = findPlaceName(url);
    if (name && name !== fav.name) { fav.name = name; saveFavorites(favs); }
  }

  // ─── 업체 테이블 렌더링 ───
  function renderPlaceTable() {
    const wrap = document.getElementById('placeCardsWrap');
    const places = historyData?.places || {};
    const entries = Object.values(places).filter(p => p.placeName && p.placeName !== p.placeId);

    document.getElementById('statPlaces').textContent = entries.length;

    // 총 키워드 수 / TOP3 수
    let totalKw = 0, top3Count = 0;
    for (const place of entries) {
      const kws = Object.entries(place.keywords || {});
      totalKw += kws.length;
      for (const [, data] of kws) {
        const r = data.records?.[0]?.rank;
        if (r && r <= 3) top3Count++;
      }
    }
    document.getElementById('statKeywords').textContent = totalKw;
    document.getElementById('statTop3').textContent = top3Count;

    if (entries.length === 0) {
      wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📍</div><p>아직 추적 중인 업체가 없습니다.<br>순위 조회에서 키워드를 검색해보세요!</p></div>';
      return;
    }

    const favs = loadFavorites();
    let html = '';

    for (const place of entries) {
      const isFav = favs.some(f => f.url === place.url || f.url === place.placeId);
      const starClass = isFav ? 'star-btn saved' : 'star-btn';
      const starIcon = isFav ? '★' : '☆';
      const kwEntries = Object.entries(place.keywords || {});

      // 최근 조회 시간
      let latestTime = null;
      for (const [, data] of kwEntries) {
        const t = data.records?.[0]?.timestamp;
        if (t && (!latestTime || new Date(t) > new Date(latestTime))) latestTime = t;
      }
      const timeStr = latestTime ? formatRelativeTime(new Date(latestTime)) : '-';

      html += `<div class="card" style="cursor:pointer" onclick="showHistory('${place.placeId}')">
        <div class="card-header">
          <h3>
            <button class="${starClass}" onclick="event.stopPropagation();togglePlaceFav('${place.placeId}')" style="font-size:18px">${starIcon}</button>
            ${esc(place.placeName)}
            <span class="badge badge-gray" style="font-size:11px;font-family:monospace">${place.placeId}</span>
          </h3>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:12px;color:var(--text-light)">${timeStr}</span>
            <button class="btn-outline" style="padding:6px 12px;font-size:12px" onclick="event.stopPropagation();showHistory('${place.placeId}')">이력 보기</button>
          </div>
        </div>
        <div class="card-body" style="padding:0">
          <table class="rank-table">
            <thead><tr><th>키워드</th><th style="text-align:center">현재 순위</th><th style="text-align:center">변동</th><th style="text-align:center">이전 순위</th></tr></thead>
            <tbody>`;

      for (const [kw, data] of kwEntries) {
        const latest = data.records?.[0];
        const prev = data.records?.[1];
        const rank = latest?.rank;
        const prevRank = prev?.rank;

        let rankClass = 'other';
        let rankText = rank ? `${rank}위` : '순위권 밖';
        if (rank === null) rankClass = 'notfound';
        else if (rank <= 3) rankClass = 'top3';
        else if (rank <= 10) rankClass = 'top10';

        let changeHtml = '<span class="rank-change same">—</span>';
        if (rank !== null && prevRank !== null && prevRank !== undefined) {
          const diff = prevRank - rank;
          if (diff > 0) changeHtml = `<span class="rank-change up">▲ ${diff}</span>`;
          else if (diff < 0) changeHtml = `<span class="rank-change down">▼ ${Math.abs(diff)}</span>`;
        }

        const prevText = prevRank ? `${prevRank}위` : (prev ? '순위권 밖' : '-');

        html += `<tr>
          <td style="font-weight:600">${esc(kw)}</td>
          <td style="text-align:center"><span class="rank-cell ${rankClass}">${rankText}</span></td>
          <td style="text-align:center">${changeHtml}</td>
          <td style="text-align:center;color:var(--text-light)">${prevText}</td>
        </tr>`;
      }

      html += `</tbody></table></div></div>`;
    }

    wrap.innerHTML = html;
  }

  function formatRelativeTime(date) {
    const now = new Date();
    const diff = now - date;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return '방금';
    if (mins < 60) return `${mins}분 전`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}시간 전`;
    const days = Math.floor(hrs / 24);
    return `${days}일 전`;
  }

  // ─── 이력 상세 ───
  function showHistory(placeId) {
    currentPlaceIdForHistory = placeId;
    const panel = document.getElementById('historyPanel');
    const title = document.getElementById('historyTitle');
    const tabs = document.getElementById('historyTabs');

    const place = historyData?.places?.[placeId];
    if (!place) return;

    title.textContent = `📋 ${place.placeName} 순위 이력`;

    const kwList = Object.keys(place.keywords || {});
    tabs.innerHTML = `
      <button class="history-tab active" onclick="filterHistory('${placeId}', null, this)">전체</button>
      ${kwList.map(kw => `
        <button class="history-tab" onclick="filterHistory('${placeId}', '${esc(kw)}', this)">${esc(kw)}</button>
      `).join('')}
    `;

    filterHistory(placeId, null, tabs.querySelector('.active'));
    panel.classList.add('show');

    // 순위 조회 폼에 URL + 키워드 채우기
    document.getElementById('placeUrl').value = place.url || place.placeId;
    lastPlaceUrl = place.url || place.placeId;
    keywordList.length = 0;
    keywordList.push(...kwList);
    renderTags();
    updateFavBtn();

    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function filterHistory(placeId, keyword, tabEl) {
    document.querySelectorAll('.history-tab').forEach(t => t.classList.remove('active'));
    if (tabEl) tabEl.classList.add('active');

    const place = historyData?.places?.[placeId];
    if (!place) return;

    const wrap = document.getElementById('dailyBoxesWrap');
    const kwMap = keyword ? { [keyword]: place.keywords[keyword] } : place.keywords;

    drawChart(placeId, keyword);

    // 키워드별 일자별 최신 기록 그룹핑
    let html = '';
    for (const [kw, data] of Object.entries(kwMap || {})) {
      const records = (data?.records || []).slice().reverse(); // 오래된순 정렬
      if (records.length === 0) continue;

      // 일자별 그룹핑 (같은 날 여러 조회 → 마지막 것 사용)
      const dayMap = new Map();
      for (const r of records) {
        const d = new Date(r.timestamp);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        dayMap.set(key, r);
      }

      const days = [...dayMap.entries()]; // [dateStr, record]

      html += `<div class="daily-kw-section">`;
      if (!keyword) {
        html += `<div class="daily-kw-label"><span class="kw-badge">${esc(kw)}</span></div>`;
      }
      html += `<div class="daily-boxes">`;

      for (let i = 0; i < days.length; i++) {
        const [dateStr, r] = days[i];
        const prevRecord = i > 0 ? days[i - 1][1] : null;
        const rank = r.rank;
        const d = new Date(r.timestamp);
        const label = `${d.getMonth()+1}/${d.getDate()}`;
        const timeLabel = `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;

        let rankClass = 'other';
        let rankText = rank !== null ? `${rank}` : '-';
        if (rank === null) rankClass = 'notfound';
        else if (rank <= 3) rankClass = 'top3';
        else if (rank <= 10) rankClass = 'top10';

        let changeHtml = '';
        if (rank !== null && prevRecord?.rank !== null && prevRecord?.rank !== undefined) {
          const diff = prevRecord.rank - rank;
          if (diff > 0) changeHtml = `<div class="db-change up">▲ ${diff}</div>`;
          else if (diff < 0) changeHtml = `<div class="db-change down">▼ ${Math.abs(diff)}</div>`;
          else changeHtml = `<div class="db-change same">—</div>`;
        } else if (i === 0) {
          changeHtml = `<div class="db-change new-entry">NEW</div>`;
        } else {
          changeHtml = `<div class="db-change same">—</div>`;
        }

        html += `<div class="daily-box">
          <div class="db-date">${label} <span style="opacity:0.6">${timeLabel}</span></div>
          <div class="db-rank ${rankClass}">${rankText}<span style="font-size:12px;font-weight:600">위</span></div>
          ${changeHtml}
        </div>`;
      }

      html += `</div></div>`;
    }

    wrap.innerHTML = html || '<div style="color:var(--text-light);font-size:13px;padding:12px 0">이력 데이터가 없습니다.</div>';
  }

  // ─── 순위 재측정 ───
  async function recheckCurrentPlace() {
    if (!currentPlaceIdForHistory) return;
    const place = historyData?.places?.[currentPlaceIdForHistory];
    if (!place) return;

    const btn = document.getElementById('recheckBtn');
    btn.disabled = true;
    btn.textContent = '측정 중...';

    const kwList = Object.keys(place.keywords || {});
    const url = place.url || place.placeId;

    try {
      for (const kw of kwList) {
        btn.textContent = `측정 중... (${kw})`;
        await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, keywords: [kw] }),
        });
      }
      await loadHistoryData();
      renderPlaceTable();
      showHistory(currentPlaceIdForHistory);
      btn.textContent = '🔄 순위 재측정';
    } catch (err) {
      alert('재측정 중 오류: ' + err.message);
      btn.textContent = '🔄 순위 재측정';
    }
    btn.disabled = false;
  }

  // ─── 차트 ───
  const CHART_COLORS = ['#03C75A','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#14b8a6','#f97316','#ec4899'];

  function drawChart(placeId, keyword) {
    const canvas = document.getElementById('rankChart');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('chartTooltip');
    const legend = document.getElementById('chartLegend');
    const place = historyData?.places?.[placeId];
    if (!place) return;

    const kwNames = keyword ? [keyword] : Object.keys(place.keywords || {});
    const series = [];
    for (const kw of kwNames) {
      const records = (place.keywords[kw]?.records || [])
        .filter(r => r.rank !== null)
        .map(r => ({ time: new Date(r.timestamp), rank: r.rank }))
        .reverse();
      if (records.length > 0) series.push({ keyword: kw, data: records });
    }

    if (series.length === 0) {
      document.getElementById('chartWrap').style.display = 'none';
      return;
    }
    document.getElementById('chartWrap').style.display = 'block';

    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = 220 * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width, H = 220;
    const pad = { top: 20, right: 20, bottom: 40, left: 44 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    let minRank = Infinity, maxRank = -Infinity, allTimes = [];
    for (const s of series) {
      for (const d of s.data) {
        if (d.rank < minRank) minRank = d.rank;
        if (d.rank > maxRank) maxRank = d.rank;
        allTimes.push(d.time.getTime());
      }
    }
    minRank = Math.max(1, minRank);
    maxRank = Math.max(maxRank, minRank + 1);
    const rankPad = Math.max(1, Math.ceil((maxRank - minRank) * 0.15));
    const yMin = Math.max(1, minRank - rankPad);
    const yMax = maxRank + rankPad;
    const tMin = Math.min(...allTimes), tMax = Math.max(...allTimes);
    const tRange = tMax - tMin || 1;

    function xPos(t) { return pad.left + ((t - tMin) / tRange) * plotW; }
    function yPos(rank) { return pad.top + ((rank - yMin) / (yMax - yMin)) * plotH; }

    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = '#e5e7eb';
    ctx.lineWidth = 1;
    const ySteps = Math.min(6, yMax - yMin);
    const yStep = Math.max(1, Math.round((yMax - yMin) / ySteps));
    for (let r = Math.ceil(yMin); r <= Math.floor(yMax); r += yStep) {
      const y = yPos(r);
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
      ctx.fillStyle = '#9ca3af'; ctx.font = '11px -apple-system, sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(`${r}위`, pad.left - 6, y);
    }

    ctx.fillStyle = '#9ca3af'; ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const xLabelCount = Math.min(6, Math.max(2, series[0]?.data.length || 2));
    for (let i = 0; i < xLabelCount; i++) {
      const t = tMin + (tRange * i) / (xLabelCount - 1);
      const d = new Date(t);
      const label = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
      ctx.fillText(label, xPos(t), H - pad.bottom + 8);
    }

    const hitPoints = [];

    series.forEach((s, si) => {
      const color = CHART_COLORS[si % CHART_COLORS.length];
      const pts = s.data.map(d => ({ x: xPos(d.time.getTime()), y: yPos(d.rank), rank: d.rank, time: d.time, keyword: s.keyword }));

      ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
      ctx.beginPath();
      pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.stroke();

      const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
      ctx.fillStyle = `rgba(${r},${g},${b},0.06)`;
      ctx.beginPath();
      pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.lineTo(pts[pts.length-1].x, pad.top + plotH);
      ctx.lineTo(pts[0].x, pad.top + plotH);
      ctx.closePath(); ctx.fill();

      pts.forEach(p => {
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
        hitPoints.push({ ...p, color });
      });
    });

    legend.innerHTML = series.map((s, i) => `
      <span class="chart-legend-item">
        <span class="chart-legend-dot" style="background:${CHART_COLORS[i % CHART_COLORS.length]}"></span>
        ${esc(s.keyword)}
      </span>
    `).join('');

    canvas.onmousemove = (e) => {
      const br = canvas.getBoundingClientRect();
      const mx = e.clientX - br.left, my = e.clientY - br.top;
      let closest = null, minDist = 20;
      for (const p of hitPoints) {
        const d = Math.hypot(p.x - mx, p.y - my);
        if (d < minDist) { minDist = d; closest = p; }
      }
      if (closest) {
        const date = closest.time.toLocaleString('ko-KR');
        tooltip.innerHTML = `<div style="color:${closest.color};font-weight:700">${esc(closest.keyword)}</div><div>${closest.rank}위 · ${date}</div>`;
        tooltip.classList.add('show');
        let tx = closest.x + 12, ty = closest.y - 40;
        if (tx + 160 > W) tx = closest.x - 160;
        if (ty < 0) ty = closest.y + 12;
        tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';
      } else { tooltip.classList.remove('show'); }
    };
    canvas.onmouseleave = () => tooltip.classList.remove('show');
  }

  // ─── 전체 순위 리스트 ───
  function renderRankedList(list, targetPlaceId, idx) {
    const count = list.length;
    let rows = '';
    for (const item of list) {
      const isMe = targetPlaceId && item.placeId === targetPlaceId;
      const rowClass = isMe ? 'rl-highlight' : '';
      let rankClass = '';
      if (item.rank === 1) rankClass = 'top1';
      else if (item.rank === 2) rankClass = 'top2';
      else if (item.rank === 3) rankClass = 'top3';

      rows += `<tr class="${rowClass}">
        <td><span class="rl-rank-num ${rankClass}">${item.rank}</span></td>
        <td>${esc(item.placeName || '-')}${isMe ? '<span class="rl-my-badge">내 업체</span>' : ''}</td>
        <td style="font-size:11px;color:var(--text-light);font-family:monospace">${item.placeId || '-'}</td>
      </tr>`;
    }

    return `
      <button class="ranked-list-toggle" onclick="toggleRankedList(${idx}, this)">
        <span class="toggle-arrow">▼</span> 전체 순위 보기 (${count}개)
      </button>
      <div class="ranked-list-wrap" id="rlWrap${idx}">
        <div class="rl-scroll-box">
          <table class="ranked-list-table">
            <thead><tr><th style="width:50px">#</th><th>업체명</th><th style="width:100px">Place ID</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  function toggleRankedList(idx, btn) {
    const wrap = document.getElementById(`rlWrap${idx}`);
    const isOpen = wrap.classList.toggle('open');
    btn.classList.toggle('open', isOpen);

    // 하이라이트된 행으로 자동 스크롤
    if (isOpen) {
      setTimeout(() => {
        const hl = wrap.querySelector('.rl-highlight');
        if (hl) hl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 150);
    }
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  init();
</script>
